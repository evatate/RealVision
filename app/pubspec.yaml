name: realvision
description: ADRD assessment application with multimodal biomarker detection
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  sentry_flutter: ^9.13.0
  flutter:
    sdk: flutter
  get_it: ^9.2.0
  
  # Face & Smile
  google_mlkit_face_detection: ^0.13.1
  google_mlkit_commons: ^0.11.0
  google_ml_kit: ^0.20.0
  
  # UI & Design
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # Camera & Media
  camera: ^0.11.3
  image: ^4.7.2
  
  # Audio & Speech
  speech_to_text: 7.2.0
  flutter_tts: ^4.2.3
  permission_handler: ^12.0.1
  flutter_sound: ^9.2.13
  
  # Motion Sensors
  sensors_plus: ^7.0.0
  
  # ML Models
  tflite_flutter: ^0.12.1
  
  # State Management
  provider: ^6.1.1
  
  # Storage & HTTP
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.5 
  logging: ^1.2.0 

  # AWS Amplify packages
  amplify_flutter: ^2.0.0
  amplify_auth_cognito: ^2.0.0
  amplify_storage_s3: ^2.0.0
  
  # UUID for generating unique IDs
  uuid: ^4.2.0

dev_dependencies:
  sentry_dart_plugin: ^3.2.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/models/
sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: realvision
  org: eva-tate
